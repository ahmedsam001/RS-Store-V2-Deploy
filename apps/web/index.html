<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var language = localStorage.getItem('rs_language') === 'en' ? 'en' : 'ar';
          var direction = language === 'ar' ? 'rtl' : 'ltr';
          document.documentElement.lang = language;
          document.documentElement.dir = direction;
          document.documentElement.classList.add(direction === 'rtl' ? 'rs-rtl' : 'rs-ltr');
        } catch (_error) {
          document.documentElement.lang = 'ar';
          document.documentElement.dir = 'rtl';
          document.documentElement.classList.add('rs-rtl');
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://api.rs-store.me" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <meta
      name="description"
      content="RS Store - Modern e-commerce experience to browse products, flash sales, and complete orders easily"
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#1f2937" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RS Store" />
    <meta property="og:description" content="Shop curated products and flash sales from RS Store" />
    <title>RS Store</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
